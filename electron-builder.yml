appId: com.showhisper.app
productName: SHOWhisper

mac:
  icon: assets/icon.icns
  # Ad-hoc code signing ("-"): free, no Apple Developer account. Apple Silicon
  # rejects an entirely unsigned app with the hard "app is damaged" error; an
  # ad-hoc signature turns that into the milder "cannot be verified" prompt that
  # users can bypass via right-click → Open (or System Settings → Open Anyway).
  # Fully frictionless opening still requires a Developer ID + notarization.
  identity: "-"
  # Hardened runtime enables library validation, which (combined with ad-hoc
  # signing) blocks our unsigned native prebuilds (onnxruntime-node, nut-js) at
  # launch. We don't notarize, so hardened runtime buys us nothing — keep it off
  # so the native modules load.
  hardenedRuntime: false
  # No fixed arch list: the architecture is driven by the build command
  # (electron-builder --arm64 / --x64) or defaults to the host arch. This
  # keeps each CI runner building only its own architecture, so the native
  # prebuilds (onnxruntime-node, nut-js are fetched per host arch)
  # match the target instead of shipping arm64 binaries inside an x64 dmg.
  target:
    - dmg
  category: public.app-category.productivity

win:
  icon: assets/icon.ico
  target:
    - target: nsis

files:
  - "**/*"
  - "!node_modules/electron-builder/**"

asar: true
# Native modules must be unpacked from the asar archive, otherwise the loader
# can't find the *.node/*.dylib binaries in the packaged build (the app starts
# locally via `npm start`, but the .dmg version fails to load the modules).
asarUnpack:
  - "**/node_modules/@nut-tree-fork/**"
  - "**/node_modules/onnxruntime-node/**"
  - "**/*.node"
