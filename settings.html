<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <title>SHOWhisper – Einstellungen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111113;
      color: #e8e8ea;
      padding: 24px;
      font-size: 13px;
      line-height: 1.5;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 6px;
    }

    select, input {
      width: 100%;
      padding: 8px 10px;
      background: #1e1e22;
      border: 1px solid #2e2e34;
      border-radius: 8px;
      color: #e8e8ea;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input:focus {
      border-color: #5b5bd6;
    }

    select option { background: #1e1e22; }

    .hint {
      margin-top: 5px;
      font-size: 11px;
      color: #555;
    }

    .hint a {
      color: #5b5bd6;
      text-decoration: none;
      cursor: pointer;
    }

    .divider {
      height: 1px;
      background: #2e2e34;
      margin: 20px 0;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    button {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    #btn-cancel {
      background: #2e2e34;
      color: #e8e8ea;
    }

    #btn-save {
      background: #5b5bd6;
      color: #fff;
    }

    #status {
      font-size: 12px;
      color: #4ade80;
      text-align: right;
      min-height: 18px;
      margin-top: 10px;
    }

    #progress-section {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      background: #1a1a1f;
      border: 1px solid #2e2e34;
      border-radius: 10px;
    }

    #progress-section.visible { display: block; }

    #progress-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #progress-label span {
      color: #e8e8ea;
      font-weight: 500;
    }

    .progress-bar-track {
      height: 5px;
      background: #2e2e34;
      border-radius: 999px;
      overflow: hidden;
    }

    #progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5b5bd6, #7c7ce0);
      border-radius: 999px;
      transition: width 0.2s ease;
    }

    #progress-pct {
      font-size: 11px;
      color: #555;
      text-align: right;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h1>🎙 SHOWhisper – Einstellungen</h1>

  <div class="field">
    <label>Modell-Provider</label>
    <select id="provider">
      <option value="Xenova">Xenova (public, kein Token nötig)</option>
      <option value="onnx-community">onnx-community (neuere Modelle, Token empfohlen)</option>
    </select>
    <p class="hint">Bestimmt von welchem HuggingFace-Namespace die Whisper-Modelle geladen werden.</p>
  </div>

  <div class="field">
    <label>HuggingFace Read-Token</label>
    <input type="password" id="hf-token" placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off"/>
    <p class="hint">
      Nur nötig für onnx-community oder gated models.
      <a onclick="openHF()">Token erstellen →</a>
    </p>
  </div>

  <div class="divider"></div>

  <div class="actions">
    <button id="btn-cancel">Abbrechen</button>
    <button id="btn-save">Speichern &amp; Modell neu laden</button>
  </div>

  <div id="progress-section">
    <div id="progress-label">Modell wird geladen…</div>
    <div class="progress-bar-track">
      <div id="progress-bar-fill"></div>
    </div>
    <div id="progress-pct">0%</div>
  </div>

  <div id="status"></div>

  <script>
    async function init() {
      const cfg = await window.settings.get()
      document.getElementById('provider').value   = cfg.provider || 'Xenova'
      document.getElementById('hf-token').value   = cfg.hfToken  || ''
    }

    function openHF() {
      // shell.openExternal ist im Renderer ohne nodeIntegration nicht verfügbar
      // -> über den dedizierten shell-open-Kanal im Main-Prozess öffnen
      window.settings.openExternal('https://huggingface.co/settings/tokens')
    }

    document.getElementById('btn-save').addEventListener('click', async () => {
      const provider = document.getElementById('provider').value
      const hfToken  = document.getElementById('hf-token').value.trim()

      document.getElementById('btn-save').disabled   = true
      document.getElementById('btn-cancel').disabled = true
      document.getElementById('progress-section').classList.add('visible')

      await window.settings.save({ provider, hfToken })
    })

    window.settings.onProgress((data) => {
      const section = document.getElementById('progress-section')
      const fill    = document.getElementById('progress-bar-fill')
      const pct     = document.getElementById('progress-pct')
      const status  = document.getElementById('status')

      if (data.status === 'progress') {
        section.classList.add('visible')
        const p = Math.round(data.progress)
        fill.style.width    = `${p}%`
        pct.textContent     = `${p}%`
      }

      if (data.status === 'ready') {
        fill.style.width   = '100%'
        pct.textContent    = '100%'
        status.textContent = '✓ Modell geladen'
        setTimeout(() => window.close(), 900)
      }

      if (data.status === 'error') {
        section.classList.remove('visible')
        status.style.color     = '#f87171'
        status.textContent     = `⚠️ Fehler: ${data.message || 'Modell konnte nicht geladen werden'}`
        document.getElementById('btn-save').disabled   = false
        document.getElementById('btn-cancel').disabled = false
      }
    })

    document.getElementById('btn-cancel').addEventListener('click', () => window.close())

    init()
  </script>
</body>
</html>
